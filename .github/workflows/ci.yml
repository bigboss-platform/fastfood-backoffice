name: CI

on:
    pull_request:
        branches: [develop, main]
    push:
        branches: [develop]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - uses: pnpm/action-setup@v3
              with:
                  version: latest

            - name: Install dependencies
              run: pnpm install

            - name: Type check
              run: pnpm type-check

            - name: Lint
              run: pnpm lint

            - name: Unit and integration tests
              run: pnpm test:ci

            - name: Build check
              run: pnpm build
